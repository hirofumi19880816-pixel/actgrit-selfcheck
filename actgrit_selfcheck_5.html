<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なぜあなたは、動けていないのか。— ActGrit Self Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;min-height:100vh}
.wrap{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#f0f0f0;max-width:600px;margin:0 auto;padding:0 0 6rem}
.hero{padding:3.5rem 2rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.tag{display:inline-block;background:rgba(245,106,0,0.15);color:#f56a00;font-size:10px;padding:3px 10px;border-radius:2px;letter-spacing:0.1em;font-weight:700;margin-bottom:1.2rem}
.hero h1{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:0.8rem}
.hero h1 span{color:#f56a00}
.hero p{font-size:13px;line-height:1.8;color:#888}
.q-area{padding:2.5rem 2rem}
.progress-bar{height:2px;background:rgba(255,255,255,0.08);border-radius:1px;margin-bottom:2rem;overflow:hidden}
.progress-fill{height:2px;background:#f56a00;border-radius:1px;transition:width 0.4s ease}
.q-num{font-size:10px;letter-spacing:0.12em;color:#f56a00;font-weight:700;margin-bottom:0.6rem}
.q-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:0.5rem;color:#f0f0f0}
.q-sub{font-size:12px;color:#666;margin-bottom:1.75rem;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:16px 18px;cursor:pointer;font-size:14px;color:#aaa;text-align:left;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:12px;width:100%}
.opt:hover{border-color:rgba(245,106,0,0.4);color:#f0f0f0}
.opt.selected{border-color:#f56a00;background:rgba(245,106,0,0.08);color:#f0f0f0}
.opt-dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt.selected .opt-dot{border-color:#f56a00;background:#f56a00}
.opt.selected .opt-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.75rem}
.nav-info{font-size:11px;color:#555}
.btn-next{background:#f56a00;color:#fff;border:none;padding:12px 28px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;opacity:0.4;pointer-events:none;transition:opacity 0.2s}
.btn-next.active{opacity:1;pointer-events:auto}
.btn-next.active:hover{background:#d45e00}
.result-area{padding:2.5rem 2rem;display:none}
.result-tag{font-size:10px;letter-spacing:0.12em;color:#f56a00;font-weight:700;margin-bottom:0.5rem}
.result-type{font-size:22px;font-weight:700;margin-bottom:1rem;line-height:1.35}
.result-type span{color:#f56a00}
.result-illust{margin-bottom:1.5rem;border-radius:4px;overflow:hidden;background:#111}
.result-desc{font-size:13px;line-height:1.85;color:#aaa;margin-bottom:1.75rem;border-left:2px solid #f56a00;padding-left:1rem}
.result-label{font-size:10px;letter-spacing:0.1em;color:#555;font-weight:700;margin-bottom:0.75rem;text-transform:uppercase}
.result-points{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.point{background:#141414;border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:14px 16px;font-size:13px;color:#bbb;line-height:1.7;display:flex;gap:10px}
.point-mark{color:#f56a00;font-weight:700;flex-shrink:0;padding-top:1px}
.score-bar-wrap{margin-bottom:2rem}
.score-bar-bg{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:0.5rem}
.score-bar-fill{height:4px;background:#f56a00;border-radius:2px;transition:width 0.6s ease}
.score-row{display:flex;justify-content:space-between;align-items:center}
.score-row span:first-child{font-size:12px;color:#888}
.score-row span:last-child{font-size:12px;font-weight:700;color:#f56a00}
.cta-block{background:#141414;border:1px solid rgba(245,106,0,0.2);border-radius:4px;padding:2rem;text-align:center}
.cta-block h3{font-size:16px;font-weight:700;margin-bottom:0.5rem;color:#f0f0f0}
.cta-block p{font-size:12px;color:#888;line-height:1.8;margin-bottom:1.5rem}
.btn-cta{background:#f56a00;color:#fff;border:none;padding:14px 32px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:background 0.15s;text-decoration:none;display:block}
.btn-cta:hover{background:#d45e00}
.btn-retry{background:transparent;color:#555;border:1px solid rgba(255,255,255,0.08);padding:10px 20px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:10px;width:100%;transition:color 0.15s}
.btn-retry:hover{color:#888}
.footer{text-align:center;padding:2rem;font-size:11px;color:#333;letter-spacing:0.06em}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="tag">SELF CHECK</div>
    <h1>なぜあなたは、<span>動けていない</span>のか。</h1>
    <p>5つの問いに正直に答えてほしい。<br>「なんとなくモヤモヤしている」その正体が、見えてくる。</p>
  </div>

  <div class="q-area" id="qArea">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <p class="q-num" id="qNum">Q1 / 5</p>
    <p class="q-text" id="qText"></p>
    <p class="q-sub" id="qSub"></p>
    <div class="options" id="options"></div>
    <div class="nav">
      <p class="nav-info" id="navInfo">選択して次へ</p>
      <button class="btn-next" id="btnNext" onclick="next()">次へ →</button>
    </div>
  </div>

  <div class="result-area" id="resultArea"></div>
  <div class="footer">ActGrit — NEKKYOU Coaching</div>
</div>

<script>
const CTA_URL = "https://timerex.net/s/hirofumi19880816_5b0d/c507e6f1";

const illusts = {
  0: `<svg width="100%" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="560" height="160" fill="#0f0f0f"/>
    <circle cx="280" cy="80" r="48" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <circle cx="280" cy="80" r="32" fill="none" stroke="#222" stroke-width="1"/>
    <circle cx="280" cy="80" r="10" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
    <line x1="280" y1="20" x2="280" y2="44" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="280" y1="116" x2="280" y2="140" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="220" y1="80" x2="244" y2="80" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="316" y1="80" x2="340" y2="80" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="280" y="154" fill="#333" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="0.12em">SIGNAL DORMANT</text>
  </svg>`,

  1: `<svg width="100%" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="560" height="160" fill="#0f0f0f"/>
    <line x1="80" y1="80" x2="480" y2="80" stroke="#1e1e1e" stroke-width="1"/>
    <polyline points="80,80 160,52 200,80 260,40 300,80 360,58 400,80 480,80" fill="none" stroke="#2e2e2e" stroke-width="1.5"/>
    <line x1="300" y1="40" x2="300" y2="140" stroke="#f56a00" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <circle cx="300" cy="40" r="4" fill="none" stroke="#f56a00" stroke-width="1.5" opacity="0.5"/>
    <line x1="300" y1="80" x2="480" y2="80" stroke="#222" stroke-width="1.5"/>
    <text x="310" y="36" fill="#f56a00" font-size="9" font-family="sans-serif" opacity="0.5" letter-spacing="0.08em">?</text>
    <text x="280" y="154" fill="#333" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="0.12em">DIRECTION UNDEFINED</text>
  </svg>`,

  2: `<svg width="100%" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="560" height="160" fill="#0f0f0f"/>
    <rect x="200" y="44" width="160" height="72" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="215" y="58" width="80" height="10" rx="2" fill="#1e1e1e"/>
    <rect x="215" y="76" width="120" height="10" rx="2" fill="#1e1e1e"/>
    <rect x="215" y="94" width="60" height="10" rx="2" fill="#1e1e1e"/>
    <line x1="80" y1="80" x2="196" y2="80" stroke="#f56a00" stroke-width="1" stroke-dasharray="3,4" opacity="0.25"/>
    <line x1="364" y1="80" x2="480" y2="80" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="80" cy="80" r="5" fill="none" stroke="#f56a00" stroke-width="1.5" opacity="0.4"/>
    <text x="280" y="154" fill="#333" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="0.12em">WALL DETECTED</text>
  </svg>`,

  3: `<svg width="100%" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="560" height="160" fill="#0f0f0f"/>
    <path d="M280 30 L292 62 L326 62 L300 82 L310 114 L280 94 L250 114 L260 82 L234 62 L268 62 Z" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
    <path d="M280 46 L287 66 L308 66 L292 78 L298 98 L280 86 L262 98 L268 78 L252 66 L273 66 Z" fill="#161616" stroke="#252525" stroke-width="1"/>
    <line x1="280" y1="30" x2="280" y2="20" stroke="#f56a00" stroke-width="1.5" opacity="0.2"/>
    <circle cx="280" cy="18" r="3" fill="none" stroke="#f56a00" stroke-width="1" opacity="0.2"/>
    <text x="280" y="140" fill="#333" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="0.12em">FLAME EXTINGUISHED</text>
  </svg>`
};

const questions = [
  {
    text:"「変わりたい」と思ったことはあるか？",
    sub:"転職・独立・生き方の見直しなど、何でもいい。",
    opts:[
      {label:"ある。でも結局何もしていない", score:3},
      {label:"ある。少しだけ動いたが続かなかった", score:2},
      {label:"ある。今も動こうとしている", score:1},
      {label:"あまり考えたことがない", score:0}
    ]
  },
  {
    text:"動けない理由として、一番近いのはどれか？",
    sub:"直感で選んでいい。",
    opts:[
      {label:"何から手をつければいいか分からない", score:3},
      {label:"失敗したときのリスクが怖い", score:3},
      {label:"時間・お金・余裕がない", score:2},
      {label:"そもそも自分が何をしたいか分からない", score:3}
    ]
  },
  {
    text:"「このままでいい」と思えているか？",
    sub:"本音で答えてほしい。",
    opts:[
      {label:"全然思えていない。でも動けていない", score:3},
      {label:"思えていないが、まあいいかと流している", score:2},
      {label:"半分諦めている", score:2},
      {label:"思えている。特に不満はない", score:0}
    ]
  },
  {
    text:"「自分のやりたいこと」を誰かに話したことがあるか？",
    sub:"家族・友人・誰でもいい。",
    opts:[
      {label:"話したことがない。言葉にならない", score:3},
      {label:"話したことがあるが、「難しいよ」と言われた", score:2},
      {label:"話せるが、自分でも信じ切れていない", score:2},
      {label:"話している。応援してもらえている", score:0}
    ]
  },
  {
    text:"朝起きたとき、「今日も一日頑張ろう」と思えているか？",
    sub:"ここ1ヶ月の正直な感覚で。",
    opts:[
      {label:"思えていない。起きるのが億劫", score:3},
      {label:"なんとか起きているが、気合いがいる", score:2},
      {label:"まあ普通に起きられる", score:1},
      {label:"わりと前向きに起きられる", score:0}
    ]
  }
];

const results = [
  {
    range:[0,4], illustKey:0,
    type:"今は<span>充電期間</span>かもしれない",
    desc:"今すぐ動く必要はないかもしれない。ただ、「このままでいい」と本当に思えているなら問題ない。もし心のどこかにモヤがあるなら、それは無視しない方がいい。",
    cause:"特定の原因というより、まだ「問い」が立ち上がっていない状態。",
    points:[
      "「変わりたい」という感覚が出てきたとき、それを流さないことが大切",
      "日常の中で「これ好きだな」「これ嫌だな」を記録するだけでいい",
      "焦る必要はない。でも無視し続けると、気づいたら手遅れになることがある"
    ]
  },
  {
    range:[5,8], illustKey:1,
    type:"原因は<span>「方法が分からない」</span>ではない",
    desc:"動きたい気持ちはある。でも「何から始めるか」が分からず止まっている。これは情報不足ではない。自分の軸が定まっていないから、どの方向へ動けばいいか分からない状態。",
    cause:"動けない原因：「軸の不在」。やりたいことより先に、自分がどう在りたいかが必要。",
    points:[
      "「何をするか」より「何者でいたいか」を先に問う",
      "Core（なぜ生きるか）が決まると、行動の優先順位が自然に決まる",
      "一人で考え続けても堂々巡りになりやすい。問いをくれる存在が突破口になる"
    ]
  },
  {
    range:[9,12], illustKey:2,
    type:"原因は<span>「環境と覚悟」</span>にある",
    desc:"やりたいことはなんとなく分かっている。でも動けていない。それはリスクへの恐れか、周囲の目か、あるいは「自分にはできない」という思い込みか。意志の問題ではなく、環境と前提の問題。",
    cause:"動けない原因：「信じ込みと環境」。覚悟より先に、前提を疑うことが必要。",
    points:[
      "「失敗したらどうなるか」ではなく「動かなかったら5年後どうなるか」を問う",
      "Be（どう在りたいか）が腹に落ちると、リスクの感じ方が変わる",
      "同じ問いを持つ仲間がいると、一人では越えられない壁を越えやすくなる"
    ]
  },
  {
    range:[13,15], illustKey:3,
    type:"原因は<span>「熱量の消耗」</span>にある",
    desc:"かつてはあったはずの熱量が、日々の中で削れている。変わりたいと思っているのに動けないのは、意志が弱いからではない。消耗した状態では、どんな正論も届かない。まず熱量を取り戻すことが先決。",
    cause:"動けない原因：「熱量の枯渇」。行動より先に、エネルギーの回復が必要。",
    points:[
      "「何をするか」より「何があれば朝起きられるか」を問う",
      "小さく動くより、まず自分が熱くなれる問いを見つけることが優先",
      "毎朝6時に同じ熱量の人と話すだけで、状態が変わることがある"
    ]
  }
];

let current=0, scores=[], selected=null;

function render(){
  const q=questions[current];
  document.getElementById('qNum').textContent=`Q${current+1} / ${questions.length}`;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('qSub').textContent=q.sub;
  document.getElementById('progressFill').style.width=`${(current/questions.length)*100}%`;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  selected=null;
  document.getElementById('btnNext').classList.remove('active');
  document.getElementById('navInfo').textContent='選択して次へ';
  q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-dot"></span>${o.label}`;
    b.onclick=()=>{
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
      selected=o.score;
      document.getElementById('btnNext').classList.add('active');
      document.getElementById('navInfo').textContent=`${current+1}問目 回答済み`;
    };
    opts.appendChild(b);
  });
  const isLast=current===questions.length-1;
  document.getElementById('btnNext').textContent=isLast?'原因を見る →':'次へ →';
}

function next(){
  if(selected===null) return;
  scores.push(selected);
  if(current<questions.length-1){ current++; render(); }
  else showResult();
}

function sendToForm(pattern, score){
  const base="https://docs.google.com/forms/d/e/1FAIpQLSfNxg6wlQbggRfSvbn2oX3jK3SXuAfaMgX25LrJLSDManGXAA/formResponse";
  const url=`${base}?entry.1669747546=${encodeURIComponent(pattern)}&entry.246551014=${encodeURIComponent(score)}&submit=Submit`;
  fetch(url,{method:"GET",mode:"no-cors"}).catch(()=>{});
}

function showResult(){
  const total=scores.reduce((a,b)=>a+b,0);
  const pct=Math.round((total/15)*100);
  const r=results.find(x=>total>=x.range[0]&&total<=x.range[1])||results[results.length-1];
  const patternNames=["充電期間","軸の不在","環境と覚悟","熱量の消耗"];
  sendToForm(patternNames[r.illustKey], pct);
  document.getElementById('qArea').style.display='none';
  const ra=document.getElementById('resultArea');
  ra.style.display='block';
  ra.innerHTML=`
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <p class="result-tag">YOUR RESULT</p>
    <h2 class="result-type">${r.type}</h2>
    <div class="result-illust">${illusts[r.illustKey]}</div>
    <p class="result-desc">${r.desc}</p>
    <div class="score-bar-wrap">
      <div class="score-row"><span>熱量消耗度</span><span>${pct}%</span></div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:0%" id="scoreFill"></div></div>
    </div>
    <p class="result-label">あなたが動けない本当の原因</p>
    <div class="result-points" style="margin-bottom:1.5rem">
      <div class="point"><span class="point-mark">▎</span>${r.cause}</div>
    </div>
    <p class="result-label">次に必要なこと</p>
    <div class="result-points">
      ${r.points.map(p=>`<div class="point"><span class="point-mark">→</span>${p}</div>`).join('')}
    </div>
    <div class="cta-block">
      <h3>この原因、一緒に掘り下げませんか。</h3>
      <p>無料相談30分。あなたが動けない理由を、<br>一緒に言語化するだけでいい。勧誘はしません。</p>
      <a class="btn-cta" href="${CTA_URL}" target="_blank" rel="noopener">無料相談に申し込む →</a>
      <button class="btn-retry" onclick="retry()">もう一度やり直す</button>
    </div>
  `;
  setTimeout(()=>{
    const el=document.getElementById('scoreFill');
    if(el) el.style.width=pct+'%';
  },100);
}

function retry(){
  current=0; scores=[]; selected=null;
  document.getElementById('resultArea').style.display='none';
  document.getElementById('qArea').style.display='block';
  render();
}

render();
</script>
</body>
</html>
